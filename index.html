<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profil Szachowy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
   html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
}

#profilIframe {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  border: none;
}
</style>
</head>
<body>

 

  <iframe id="profilIframe" frameborder="0" allow="fullscreen"></iframe>

 

  <script>
    // Twój link do aplikacji (pełny, aż do /exec)
    var baseLink = "https://script.google.com/macros/s/AKfycbxJBb8fpqxVNnobe_EoTYy5O5fUI8R41Lbo-nkSLHAF2dFd7TJDEHE8lQ0yyX_i8EFD4Q/exec"

 

    var urlParams = new URLSearchParams(window.location.search);
    var user = urlParams.get('user');
    var iframe = document.getElementById("profilIframe");

 

    // Jeśli jest użytkownik w linku, dodajemy go, jeśli nie – ładujemy stronę główną
    if (user) {
      iframe.src = baseLink + "?user=" + encodeURIComponent(user);
    } else {
      iframe.src = baseLink;
    }
</script>

 

</body>
</html>
