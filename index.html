<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profil Szachowy</title>
<style>/* 🟢 TO JEST KLUCZOWE: Usuwamy marginesy i wypełniamy ekran */body, html {       margin: 0;       padding: 0;       height: 100%;       width: 100%;       overflow: hidden; /* Wyłącza paski przewijania, jeśli nie są potrzebne */    }     #profilIframe {       display: block;       width: 100vw;  /* 100% szerokości ekranu */height: 100vh; /* 100% wysokości ekranu */border: none;     }   </style>
</head>
<body>

 

  <iframe id="profilIframe" src="https://script.google.com/macros/s/AKfycbxJBb8fpqxVNnobe_EoTYy5O5fUI8R41Lbo-nkSLHAF2dFd7TJDEHE8lQ0yyX_i8EFD4Q/exec" width="100%" height="100%" frameborder="0"></iframe>

 

  <script>
    // 1. Pobieramy dopisek (np. ?user=ChessDragon_07) z paska przeglądarki na GitHubie
    var urlParams = new URLSearchParams(window.location.search);
    var user = urlParams.get('user');

 

    // 2. Znajdujemy ramkę i przekazujemy jej ten nick
    var iframe = document.getElementById("profilIframe");
    var baseLink = "https://script.google.com/macros/s/AKfycbxJBb8fpqxVNnobe_EoTYy5O5fUI8R41Lbo-nkSLHAF2dFd7TJDEHE8lQ0yyX_i8EFD4Q/exec"; // Pamiętaj, aby podmienić ten link na swój link Google Apps Script zakończony na /exec

 

    if (user) {
      iframe.src = baseLink + "?user=" + encodeURIComponent(user);
    } else {
      iframe.src = baseLink;
    }
</script>

 

</body>
</html>
